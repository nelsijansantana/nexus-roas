name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  # Empacota o instalador (install.sh + docker-compose + worker) e publica como
  # GitHub Release. O install.sh no VPS baixa este tarball via:
  #   github.com/<owner>/nexus-roas/releases/latest/download/nexus-roas.tar.gz
  #
  # As imagens Docker são publicadas manualmente via .\publish.ps1 -Version X.Y.Z
  # (não são buildadas aqui para evitar duplicação e problemas de permissão GHCR).
  release:
    name: Package & publish release
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Package installer
        run: |
          VERSION=${{ steps.version.outputs.VERSION }}
          mkdir -p /tmp/pkg/nexus-roas

          cp install.sh                  /tmp/pkg/nexus-roas/
          cp bootstrap.sh                /tmp/pkg/nexus-roas/
          cp docker-compose.prod.yml     /tmp/pkg/nexus-roas/
          cp docker-compose.traefik.yml  /tmp/pkg/nexus-roas/
          cp Makefile                    /tmp/pkg/nexus-roas/
          cp .env.example                /tmp/pkg/nexus-roas/
          cp -r worker                   /tmp/pkg/nexus-roas/worker
          rm -rf /tmp/pkg/nexus-roas/worker/node_modules
          rm -rf /tmp/pkg/nexus-roas/worker/dist

          sed -i "s|__INJECTED_BY_LICENSE__|${VERSION}|g" /tmp/pkg/nexus-roas/install.sh

          tar -czf nexus-roas.tar.gz -C /tmp/pkg nexus-roas

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          generate_release_notes: true
          tag_name: ${{ github.ref_name }}
          files: |
            nexus-roas.tar.gz
            bootstrap.sh
