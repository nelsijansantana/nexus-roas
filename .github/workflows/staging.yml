name: Staging Deploy

on:
  push:
    branches: [develop]

concurrency:
  group: staging-deploy
  cancel-in-progress: true

permissions:
  packages: write

env:
  OWNER: ${{ github.repository_owner }}

jobs:
  build-and-deploy:
    name: Build images & deploy staging
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push server (staging tag)
        uses: docker/build-push-action@v5
        with:
          context: ./server
          platforms: linux/amd64
          push: true
          tags: ghcr.io/${{ env.OWNER }}/nexus-server:staging
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & push client (staging tag)
        uses: docker/build-push-action@v5
        with:
          context: ./client
          platforms: linux/amd64
          push: true
          tags: ghcr.io/${{ env.OWNER }}/nexus-client:staging
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Deploy to staging via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          envs: GITHUB_ACTOR,GHCR_PULL_TOKEN
          script: |
            set -e
            echo "$GHCR_PULL_TOKEN" | docker login ghcr.io -u "$GITHUB_ACTOR" --password-stdin
            cd /opt/nexus-roas
            git pull origin develop
            export IMAGE_VERSION=staging
            make deploy-staging
        env:
          GITHUB_ACTOR: ${{ github.actor }}
          GHCR_PULL_TOKEN: ${{ secrets.GHCR_PULL_TOKEN }}
