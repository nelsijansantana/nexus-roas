version: 2

# Conservative cadence: monthly batches, aggressive grouping, low PR ceiling.
# Goal: keep dependencies fresh without flooding the inbox.
updates:
  - package-ecosystem: npm
    directory: /server
    schedule:
      interval: monthly
    open-pull-requests-limit: 2
    groups:
      production-deps:
        dependency-type: production
        update-types: [minor, patch]
      dev-deps:
        dependency-type: development
        update-types: [minor, patch]

  - package-ecosystem: npm
    directory: /client
    schedule:
      interval: monthly
    open-pull-requests-limit: 2
    groups:
      production-deps:
        dependency-type: production
        update-types: [minor, patch]
      dev-deps:
        dependency-type: development
        update-types: [minor, patch]

  - package-ecosystem: npm
    directory: /worker
    schedule:
      interval: monthly
    open-pull-requests-limit: 1
    groups:
      worker-deps:
        patterns: ["*"]
        update-types: [minor, patch]

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: monthly
    open-pull-requests-limit: 1
    groups:
      actions-deps:
        patterns: ["*"]
