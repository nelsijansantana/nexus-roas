version: "3.8"

# ── Traefik — Edge Router & TLS Termination ───────────────────────────────────
# Deploy once per server before any application stack.
# Creates the shared traefik_public overlay network used by all stacks.
#
# Prerequisites:
#   docker swarm init
#   docker network create --driver overlay --attachable traefik_public
#   cp .env.example .env.prod && nano .env.prod   # set LETSENCRYPT_EMAIL
#
# Deploy:
#   make setup-infra
#   # or manually:
#   bash -c "set -a && . .env.prod && set +a && docker stack deploy -c docker-compose.traefik.yml traefik"

services:
  traefik:
    image: traefik:v2.11
    command:
      - --log.level=INFO
      - --providers.docker=true
      - --providers.docker.swarmMode=true
      - --providers.docker.exposedbydefault=false
      - --providers.docker.network=traefik_public
      - --entrypoints.web.address=:80
      - --entrypoints.web.http.redirections.entrypoint.to=websecure
      - --entrypoints.web.http.redirections.entrypoint.scheme=https
      - --entrypoints.websecure.address=:443
      - --certificatesresolvers.letsencryptresolver.acme.httpchallenge=true
      - --certificatesresolvers.letsencryptresolver.acme.httpchallenge.entrypoint=web
      - --certificatesresolvers.letsencryptresolver.acme.email=${LETSENCRYPT_EMAIL}
      - --certificatesresolvers.letsencryptresolver.acme.storage=/letsencrypt/acme.json
    ports:
      - target: 80
        published: 80
        mode: host
      - target: 443
        published: 443
        mode: host
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - traefik_certs:/letsencrypt
    networks:
      - traefik_public
    deploy:
      mode: replicated
      replicas: 1
      placement:
        constraints:
          - node.role == manager
      restart_policy:
        condition: on-failure

networks:
  traefik_public:
    external: true
    name: traefik_public

volumes:
  traefik_certs:
