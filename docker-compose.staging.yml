version: "3.8"

# ── Staging — ${APP_DOMAIN} ───────────────────────────────────────────────────
# Isolated staging environment. Shares the traefik_public network (same Traefik/TLS)
# but uses separate volumes, credentials, and image tags.
#
# Requires: .env.staging with all variables from .env.example
#
# Deploy:
#   make deploy-staging
#   # or manually:
#   bash -c "set -a && . .env.staging && set +a && docker stack deploy -c docker-compose.staging.yml nexus-staging"

services:
  postgres-staging:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - nexus_staging_postgres:/var/lib/postgresql/data
    networks:
      - traefik_public
    deploy:
      mode: replicated
      replicas: 1
      restart_policy:
        condition: on-failure
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 128M
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5

  clickhouse-staging:
    image: clickhouse/clickhouse-server:latest
    environment:
      CLICKHOUSE_DB: ${CLICKHOUSE_DB}
      CLICKHOUSE_USER: ${CLICKHOUSE_USER}
      CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD}
      CLICKHOUSE_MAX_SERVER_MEMORY_USAGE: "2147483648"
      CLICKHOUSE_DEFAULT_MAX_MEMORY_USAGE: "536870912"
    volumes:
      - nexus_staging_clickhouse:/var/lib/clickhouse
    networks:
      - traefik_public
    deploy:
      mode: replicated
      replicas: 1
      resources:
        limits:
          memory: 2G
        reservations:
          memory: 512M
      restart_policy:
        condition: on-failure
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8123/ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  redis-staging:
    image: redis:7-alpine
    command: >
      redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru --save "" --appendonly no
    networks:
      - traefik_public
    deploy:
      mode: replicated
      replicas: 1
      resources:
        limits:
          memory: 300M
      restart_policy:
        condition: on-failure
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  rabbitmq-staging:
    image: rabbitmq:3.13-management-alpine
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASS}
    networks:
      - traefik_public
    deploy:
      mode: replicated
      replicas: 1
      resources:
        limits:
          memory: 256M
        reservations:
          memory: 64M
      restart_policy:
        condition: on-failure
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s

  backend-staging:
    image: ghcr.io/${GITHUB_OWNER}/nexus-server:${IMAGE_VERSION}
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres-staging:5432/${POSTGRES_DB}?schema=public
      CLICKHOUSE_HOST: http://clickhouse-staging:8123
      CLICKHOUSE_USER: ${CLICKHOUSE_USER}
      CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD}
      CLICKHOUSE_DB: ${CLICKHOUSE_DB}
      PORT: 3000
      API_URL: https://${APP_DOMAIN}
      FRONTEND_URL: https://${APP_DOMAIN}
      JWT_SECRET: ${JWT_SECRET}
      INITIAL_ADMIN_EMAIL: ${ADMIN_EMAIL}
      INITIAL_ADMIN_PASSWORD: ${ADMIN_PASSWORD}
      REDIS_URL: redis://redis-staging:6379
      RABBITMQ_URL: amqp://${RABBITMQ_USER}:${RABBITMQ_PASS}@rabbitmq-staging:5672
      WORKER_URL: ${WORKER_URL}
      CF_ACCOUNT_ID: ${CF_ACCOUNT_ID}
      CF_KV_NAMESPACE_ID: ${CF_KV_NAMESPACE_ID}
      CF_API_TOKEN: ${CF_API_TOKEN}
      GOOGLE_ADS_CLIENT_ID: ${GOOGLE_ADS_CLIENT_ID}
      GOOGLE_ADS_CLIENT_SECRET: ${GOOGLE_ADS_CLIENT_SECRET}
      GOOGLE_ADS_DEVELOPER_TOKEN: ${GOOGLE_ADS_DEVELOPER_TOKEN}
      NODE_OPTIONS: "--max-old-space-size=819"
    networks:
      - traefik_public
    depends_on:
      - clickhouse-staging
      - postgres-staging
      - redis-staging
      - rabbitmq-staging
    deploy:
      mode: replicated
      replicas: 1
      resources:
        limits:
          memory: 1G
        reservations:
          memory: 256M
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3
      update_config:
        parallelism: 1
        delay: 10s
        order: start-first
        failure_action: rollback
      labels:
        - "traefik.enable=true"
        - "traefik.http.routers.nexus-stg-api.priority=200"
        - "traefik.http.routers.nexus-stg-api.rule=Host(`${APP_DOMAIN}`) && (PathPrefix(`/api`) || PathPrefix(`/tracking`) || PathPrefix(`/webhooks`))"
        - "traefik.http.routers.nexus-stg-api.entrypoints=websecure"
        - "traefik.http.routers.nexus-stg-api.tls.certresolver=letsencryptresolver"
        - "traefik.http.services.nexus-stg-api-svc.loadbalancer.server.port=3000"

  frontend-staging:
    image: ghcr.io/${GITHUB_OWNER}/nexus-client:${IMAGE_VERSION}
    networks:
      - traefik_public
    depends_on:
      - backend-staging
    deploy:
      mode: replicated
      replicas: 1
      resources:
        limits:
          memory: 256M
      restart_policy:
        condition: on-failure
      labels:
        - "traefik.enable=true"
        - "traefik.http.routers.nexus-stg-web.priority=100"
        - "traefik.http.routers.nexus-stg-web.rule=Host(`${APP_DOMAIN}`)"
        - "traefik.http.routers.nexus-stg-web.entrypoints=websecure"
        - "traefik.http.routers.nexus-stg-web.tls.certresolver=letsencryptresolver"
        - "traefik.http.services.nexus-stg-web-svc.loadbalancer.server.port=80"

networks:
  traefik_public:
    external: true
    name: traefik_public

volumes:
  nexus_staging_postgres:
  nexus_staging_clickhouse:
